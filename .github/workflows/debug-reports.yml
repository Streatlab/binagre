name: Debug Rushour Reports (volcado HTML)

on:
  workflow_dispatch:
    inputs:
      fecha:
        description: "Fecha objetivo AAAA-MM-DD"
        type: string
        default: "2026-06-01"

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar dependencias
        run: npm install --no-audit --no-fund
      - name: Instalar navegador Playwright
        run: npx playwright install --with-deps chromium
      - name: Volcar HTML de Reports
        env:
          DEBUG_FECHA: ${{ github.event.inputs.fecha }}
          RUSHOUR_USER: ${{ secrets.RUSHOUR_USER }}
          RUSHOUR_PASS: ${{ secrets.RUSHOUR_PASS }}
          SUPABASE_URL: https://eryauogxcpbgdryeimdq.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/robot-ingesta/debug-reports.ts
