name: merge-b6-equipo
on:
  push:
    paths:
      - '.github/workflows/merge-b6-equipo.yml'
permissions:
  contents: write
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: trabajo
          fetch-depth: 0
      - name: Merge claude/b6-xkyf0o (Equipo v2 F1) en trabajo
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git merge origin/claude/b6-xkyf0o -m "Merge Equipo v2 F1 (5 tandas de Cody) en trabajo [deploy]" || true
          # Conflictos verificados en local: solo 3 archivos, la versión de la rama b6
          # es la buena (0 hex, filtro plantilla, ficha 360 conservada, build en verde).
          git checkout --theirs src/components/equipo/ModalEmpleado.tsx src/pages/equipo/TabEmpleados.tsx src/pages/equipo/TabNominas.tsx
          git add -A
          git -c core.editor=true merge --continue || git commit -m "Merge Equipo v2 F1 (5 tandas de Cody) en trabajo [deploy]"
          git push origin trabajo
