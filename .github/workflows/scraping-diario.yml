name: Extracción diaria de facturación

on:
  schedule:
    # Objetivo: 16:00 y 23:00 hora de Madrid.
    # GitHub Cron es UTC y no entiende horario de verano, así que disparamos en las
    # horas UTC que cubren ambas estaciones; run.ts filtra a la hora real de Madrid.
    #   16:00 Madrid = 14:00 UTC (verano) / 15:00 UTC (invierno)
    #   23:00 Madrid = 21:00 UTC (verano) / 22:00 UTC (invierno)
    - cron: '0 14,15,21,22 * * *'
  workflow_dispatch:
    inputs:
      portales:
        description: 'Portales a ejecutar (coma-separados)'
        default: 'uber,glovo,justeat,rushour,bbva'

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scrapers
    env:
      IMPORT_BASE: ${{ vars.IMPORT_BASE || 'https://binagre.vercel.app' }}
      IMPORT_SECRET: ${{ secrets.IMPORT_SECRET }}
      SCRAPER_PORTALES: ${{ github.event.inputs.portales || 'uber,glovo,justeat,rushour,bbva' }}
      # Ejecución manual: forzar sin esperar a la hora objetivo
      FORZAR: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
      UBER_STORAGE_STATE: ${{ secrets.UBER_STORAGE_STATE }}
      GLOVO_STORAGE_STATE: ${{ secrets.GLOVO_STORAGE_STATE }}
      JUSTEAT_STORAGE_STATE: ${{ secrets.JUSTEAT_STORAGE_STATE }}
      RUSHOUR_STORAGE_STATE: ${{ secrets.RUSHOUR_STORAGE_STATE }}
      BBVA_STORAGE_STATE: ${{ secrets.BBVA_STORAGE_STATE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Instalar navegador Playwright
        run: npx playwright install --with-deps chromium
      - name: Ejecutar extracción
        run: npm run run
