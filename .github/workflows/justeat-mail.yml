name: Just Eat facturas por correo (diario 04:30 Madrid)

# Las facturas de JE llegan por email a admin@streatlab.com (a menudo a spam).
# Este robot lee el buzón por IMAP y deja la factura en la bandeja. Just Eat NO
# adjunta archivo: la factura es el CUERPO del correo → el robot genera un PDF de
# ese cuerpo con Chromium (v5), por eso ahora se instala Playwright.
# BLOQUEO CERO: checkout de trabajo. Doble cron verano/invierno con candado por
# hora real de Madrid.
on:
  schedule:
    - cron: "30 2 * * *"   # 04:30 Madrid (verano)
    - cron: "30 3 * * *"   # 04:30 Madrid (invierno)
  workflow_dispatch:
  push:
    branches: [trabajo]
    paths:
      - ".github/workflows/justeat-mail.yml"

jobs:
  facturas-mail:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Candado horario (solo 04:xx Madrid en cron)
        id: candado
        run: |
          H=$(TZ=Europe/Madrid date +%H)
          if [ "${{ github.event_name }}" != "schedule" ] || [ "$H" = "04" ]; then
            echo "seguir=1" >> $GITHUB_OUTPUT
          else
            echo "seguir=0" >> $GITHUB_OUTPUT
            echo "En Madrid son las $H, no toca."
          fi
      - uses: actions/checkout@v4
        if: steps.candado.outputs.seguir == '1'
        with:
          ref: trabajo
      - uses: actions/setup-node@v4
        if: steps.candado.outputs.seguir == '1'
        with:
          node-version: "20"
          cache: "npm"
      - name: Instalar dependencias
        if: steps.candado.outputs.seguir == '1'
        run: npm install --no-audit --no-fund
      - name: Cache navegador Playwright
        id: cache-playwright
        if: steps.candado.outputs.seguir == '1'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Instalar navegador Playwright
        if: steps.candado.outputs.seguir == '1' && steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Instalar deps de sistema de Playwright (con caché)
        if: steps.candado.outputs.seguir == '1' && steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Leer buzón, generar PDF de la factura y entregarla a la bandeja
        if: steps.candado.outputs.seguir == '1'
        env:
          JE_MAIL_HOST: ${{ secrets.JE_MAIL_HOST }}
          JE_MAIL_USER: ${{ secrets.JE_MAIL_USER }}
          JE_MAIL_PASS: ${{ secrets.JE_MAIL_PASS }}
          SUPABASE_URL: https://eryauogxcpbgdryeimdq.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/robot-ingesta/justeat-mail.ts
