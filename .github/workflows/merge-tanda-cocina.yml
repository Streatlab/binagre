name: merge tanda cocina (un solo uso)
# Fusiona claude/tanda-cocina-platos-margen-dxugu9 en trabajo resolviendo los 5
# conflictos conocidos (union Equipo QA + Tanda Cocina), valida con tsc+vitest+build
# y se retira solo. Solo se dispara al tocar ESTE archivo. Lanzamiento: 2
on:
  push:
    branches: [trabajo]
    paths:
      - ".github/workflows/merge-tanda-cocina.yml"
jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: trabajo
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: merge con resolucion de conflictos
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/tanda-cocina-platos-margen-dxugu9
          set +e
          git merge --no-ff origin/claude/tanda-cocina-platos-margen-dxugu9 -m "Merge Tanda Cocina Única (hub de platos + Hoy + menú dos bloques + margen dinámico) [deploy]"
          MERGED=$?
          set -e
          if [ $MERGED -ne 0 ]; then
            python3 .github/scripts/resolver-merge-cocina.py
            git checkout origin/claude/tanda-cocina-platos-margen-dxugu9 -- src/components/panel/sl/uiSL.tsx
            git add -A
            git commit -m "Merge Tanda Cocina Única (hub de platos + Hoy + menú dos bloques + margen dinámico) [deploy]"
          fi
      - name: gate verde (tsc + tests + build)
        run: |
          npm ci --no-audit --no-fund
          npx tsc -p tsconfig.json --noEmit
          npx vitest run
          npx vite build
      - name: retirar workflow y publicar en trabajo
        run: |
          git rm -q .github/workflows/merge-tanda-cocina.yml .github/scripts/resolver-merge-cocina.py
          git commit -m "retirar workflow de un solo uso (merge cocina hecho)"
          git push origin trabajo
