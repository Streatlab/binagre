name: Sync Facturación (RETIRADO 20-jul-2026)

# RETIRADO: el script scripts/robot-ingesta/sync-facturacion.ts fue borrado del
# repo y el workflow llevaba fallando en silencio cada noche. Su trabajo lo
# cubren ahora:
#   - fn_corte_turno + fn_corte_a_facturacion (cortes 16:30/23:30 con Just Eat)
#   - fn_verificar_facturacion (verificador nocturno en BD, pg_cron 02:00 UTC,
#     compara Facturación vs Vivo canónico y registra divergencias reales)
# Se elimina el schedule para que no siga fallando; queda solo el disparo
# manual por si algún día se restaura el script.
on:
  workflow_dispatch:
    inputs:
      nota:
        description: "Workflow retirado — no hace nada sin el script original"
        type: string
        default: ""

jobs:
  aviso:
    runs-on: ubuntu-latest
    steps:
      - name: Aviso
        run: echo "Workflow retirado. La consolidación vive en la BD (fn_corte_turno + fn_verificar_facturacion)."
