name: PRUEBA uber semanal (temporal 19-jul)

# TEMPORAL: palanca para probar el robot Uber sin dispatch manual.
# Se dispara al tocar ESTE fichero en trabajo. Borrar cuando la prueba pase.
# palanca: 2 (20-jul: cerrar la prueba de LOS DOS informes con nombre; anoche quedaron pedidos y ya deben estar Disponibles)

on:
  push:
    branches: [trabajo]
    paths:
      - ".github/workflows/prueba-uber.yml"

jobs:
  uber:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: trabajo
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - uses: actions/cache@v4
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Robot Uber (semanal)
        env:
          MODO: semanal
          SUPABASE_URL: https://eryauogxcpbgdryeimdq.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: xvfb-run -a npx tsx scripts/robot-ingesta/uber.ts
