name: TEST precios super (5 productos)

# Prueba manual rápida del scraper Mercadona+Alcampo.
on:
  workflow_dispatch:
    inputs:
      max_items:
        description: "Cuántos productos probar"
        type: string
        default: "5"

jobs:
  test-precios-super:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: trabajo

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Instalar navegador Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar robot (modo prueba)
        env:
          DIAG: "1"
          MAX_ITEMS: ${{ github.event.inputs.max_items }}
          SUPABASE_URL: https://eryauogxcpbgdryeimdq.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/robot-precios-super/robot.ts

      - name: Subir capturas y HTML de la prueba
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-precios-super-diagnostico
          path: robot-artifacts/
          if-no-files-found: ignore
