name: Robot precios super — TIRADA COMPLETA (manual)

# Un clic = pasada completa de los 301 ingredientes contra Mercadona (API) + Alcampo.
# Corre el código de la rama trabajo. No toca la web.
on:
  workflow_dispatch:
    inputs:
      max_items:
        description: "Cuántos productos (301 = todos)"
        type: string
        default: "301"

jobs:
  precios-super-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: trabajo

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Instalar navegador Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar robot (tirada completa)
        env:
          DIAG: "1"
          MAX_ITEMS: ${{ github.event.inputs.max_items }}
          SUPABASE_URL: https://eryauogxcpbgdryeimdq.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/robot-precios-super/robot.ts

      - name: Subir diagnóstico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: precios-super-full-diagnostico
          path: robot-artifacts/
          if-no-files-found: ignore
