name: Robot ingesta diaria (Rushour + Sinqro) — DESACTIVADO (cron)

# 19-jul: cron APAGADO. La ingesta en vivo (rushour-vivo + sinqro-vivo cada 5 min)
# ya llena ventas_vivo, y el propio ERP hace el corte de turno desde ahí:
#   fn_corte_turno() → comida 16:30 y cena en el cierre 00:35 (pg_cron), y escribe
#   facturación ALM/CENAS. Este robot leía Rushour por fecha con retraso (la comida
#   caía a las 17:30-18:39 y la cena pasada medianoche, con Rushour ya a cero) y su
#   lector de Just Eat estaba roto (siempre 0). Se deja SOLO en manual por si hiciera
#   falta una toma puntual.
on:
  workflow_dispatch:
    inputs:
      diag:
        description: "Modo diagnóstico (guarda capturas/HTML)"
        type: boolean
        default: true
      toma:
        description: "Toma a ejecutar (vacío = deducir por la hora de Madrid)"
        type: choice
        options: ["", "comida", "cena"]
        default: ""
      fecha:
        description: "Fecha a procesar YYYY-MM-DD (vacío = hoy)"
        type: string
        default: ""

jobs:
  ingesta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: trabajo

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Instalar navegador Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar robot
        env:
          DIAG: ${{ github.event.inputs.diag == 'false' && '0' || '1' }}
          TOMA: ${{ github.event.inputs.toma }}
          FECHA: ${{ github.event.inputs.fecha }}
          RUSHOUR_USER: ${{ secrets.RUSHOUR_USER }}
          RUSHOUR_PASS: ${{ secrets.RUSHOUR_PASS }}
          SINQRO_USER: ${{ secrets.SINQRO_USER }}
          SINQRO_PASS: ${{ secrets.SINQRO_PASS }}
          SUPABASE_URL: https://eryauogxcpbgdryeimdq.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/robot-ingesta/robot.ts

      - name: Subir diagnóstico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-artifacts
          path: robot-artifacts/
          if-no-files-found: ignore
