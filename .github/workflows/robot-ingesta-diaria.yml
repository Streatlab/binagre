name: Robot ingesta diaria (Rushour + Sinqro)

# Dos tomas al día (comida ~16:30 Madrid, cena/cierre ~23:30 Madrid, MISMO día).
# La cena corre ANTES de medianoche a propósito: se comprobó en producción que
# el contador en vivo de Rushour se reinicia pasada la medianoche local, así
# que leer después de las 00:00 devuelve el total del día que empieza (huevo:
# turnover=0) en vez del que cierra, y la resta comida→cena sale negativa.
# Los 4 crons cubren verano+invierno porque GitHub Actions programa en UTC y no
# sabe de horario de verano; el propio robot.ts decide comida/cena por la hora
# real de Madrid al arrancar, así que el disparo "de más" que cae fuera de
# temporada no rompe el reparto (ver tomaPorHoraMadrid en robot.ts).
# También se dispara al tocar su código (push a este path) para poder probarlo
# sin usar la pestaña Actions, y por botón manual con toma/fecha explícitos.
on:
  workflow_dispatch:
    inputs:
      diag:
        description: "Modo diagnóstico (guarda capturas/HTML)"
        type: boolean
        default: true
      toma:
        description: "Toma a ejecutar (vacío = deducir por la hora de Madrid)"
        type: choice
        options: ["", "comida", "cena"]
        default: ""
      fecha:
        description: "Fecha a procesar YYYY-MM-DD (vacío = hoy)"
        type: string
        default: ""
  push:
    branches: [master]
    paths:
      - "scripts/robot-ingesta/robot.ts"
      - ".github/workflows/robot-ingesta-diaria.yml"
  schedule:
    - cron: "30 14 * * *" # comida 16:30 Madrid (verano, UTC+2)
    - cron: "30 15 * * *" # comida 16:30 Madrid (invierno, UTC+1)
    - cron: "30 21 * * *" # cena 23:30 Madrid, mismo día (verano, UTC+2)
    - cron: "30 22 * * *" # cena 23:30 Madrid, mismo día (invierno, UTC+1)

jobs:
  ingesta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Instalar navegador Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar robot
        env:
          DIAG: ${{ github.event.inputs.diag == 'false' && '0' || '1' }}
          TOMA: ${{ github.event.inputs.toma }}
          FECHA: ${{ github.event.inputs.fecha }}
          RUSHOUR_USER: ${{ secrets.RUSHOUR_USER }}
          RUSHOUR_PASS: ${{ secrets.RUSHOUR_PASS }}
          SINQRO_USER: ${{ secrets.SINQRO_USER }}
          SINQRO_PASS: ${{ secrets.SINQRO_PASS }}
          SUPABASE_URL: https://eryauogxcpbgdryeimdq.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/robot-ingesta/robot.ts

      - name: Subir diagnóstico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-artifacts
          path: robot-artifacts/
          if-no-files-found: ignore
