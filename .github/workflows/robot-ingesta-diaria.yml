name: Robot ingesta diaria (Rushour + Sinqro)

# El robot se dispara solo al actualizar su código (push a este path) para poder
# probarlo sin tocar la pestaña Actions. También queda el botón manual.
# Relanzado 2026-07-07 (tarde) tras cargar el secret de escritura a Supabase.
on:
  workflow_dispatch:
    inputs:
      diag:
        description: "Modo diagnóstico (guarda capturas/HTML)"
        type: boolean
        default: true
  push:
    branches: [master]
    paths:
      - "scripts/robot-ingesta/**"
      - ".github/workflows/robot-ingesta-diaria.yml"

jobs:
  ingesta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Instalar navegador Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar robot
        env:
          DIAG: ${{ github.event.inputs.diag == 'false' && '0' || '1' }}
          RUSHOUR_USER: ${{ secrets.RUSHOUR_USER }}
          RUSHOUR_PASS: ${{ secrets.RUSHOUR_PASS }}
          SINQRO_USER: ${{ secrets.SINQRO_USER }}
          SINQRO_PASS: ${{ secrets.SINQRO_PASS }}
          SUPABASE_URL: https://eryauogxcpbgdryeimdq.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/robot-ingesta/robot.ts

      - name: Subir diagnóstico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-artifacts
          path: robot-artifacts/
          if-no-files-found: ignore
