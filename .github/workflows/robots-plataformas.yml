name: Robots de plataforma (Uber / Glovo / Just Eat → bandeja)

# Los robots solo DESCARGAN informes y los dejan en la bandeja de Papeleo.
# No interpretan nada: de eso se encarga el parser único.
#
# Credenciales: NO están aquí. Viven en la tabla robot_credenciales de Supabase.
# Si una plataforma no tiene claves puestas, su robot sale en verde sin hacer nada.
#
# GitHub programa en UTC y no sabe de horario de verano: por eso hay dos disparos
# por franja y un candado que comprueba la hora real de Madrid.

on:
  workflow_dispatch:
    inputs:
      plataforma:
        description: "Plataforma"
        type: choice
        options: ["uber", "glovo", "justeat"]
        default: "uber"
      modo:
        description: "diario | semanal | mensual | backfill"
        type: choice
        options: ["diario", "semanal", "mensual", "backfill"]
        default: "diario"
      mes:
        description: "Solo para backfill: AAAA-MM (Uber/Glovo) o AAAA-Qn (Just Eat)"
        type: string
        default: ""
      simulacro:
        description: "1 = solo mira, no deja nada en la bandeja"
        type: choice
        options: ["0", "1"]
        default: "0"
  schedule:
    - cron: "0 2 * * *"   # 04:00 Madrid (verano) · diario
    - cron: "0 3 * * *"   # 04:00 Madrid (invierno) · diario
    - cron: "0 3 * * 1"   # 05:00 Madrid (verano) · semanal (lunes)
    - cron: "0 4 * * 1"   # 05:00 Madrid (invierno) · semanal (lunes)
    - cron: "0 3 5 * *"   # 05:00 Madrid (verano) · mensual (día 5)
    - cron: "0 4 5 * *"   # 05:00 Madrid (invierno) · mensual (día 5)

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      seguir: ${{ steps.candado.outputs.seguir }}
      modo: ${{ steps.candado.outputs.modo }}
    steps:
      - name: Candado horario y modo del día
        id: candado
        run: |
          H=$(TZ=Europe/Madrid date +%H)
          D=$(TZ=Europe/Madrid date +%u)   # 1 = lunes
          DIA=$(TZ=Europe/Madrid date +%d)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "seguir=1" >> $GITHUB_OUTPUT
            echo "modo=${{ github.event.inputs.modo }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$H" = "04" ]; then
            echo "seguir=1" >> $GITHUB_OUTPUT; echo "modo=diario" >> $GITHUB_OUTPUT; exit 0
          fi
          if [ "$H" = "05" ] && [ "$DIA" = "05" ]; then
            echo "seguir=1" >> $GITHUB_OUTPUT; echo "modo=mensual" >> $GITHUB_OUTPUT; exit 0
          fi
          if [ "$H" = "05" ] && [ "$D" = "1" ]; then
            echo "seguir=1" >> $GITHUB_OUTPUT; echo "modo=semanal" >> $GITHUB_OUTPUT; exit 0
          fi
          echo "seguir=0" >> $GITHUB_OUTPUT
          echo "modo=" >> $GITHUB_OUTPUT
          echo "En Madrid son las $H:00. No toca."

  robot:
    needs: plan
    if: needs.plan.outputs.seguir == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        plataforma: ["uber", "glovo", "justeat"]
    steps:
      - name: ¿Toca esta plataforma?
        id: toca
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ matrix.plataforma }}" = "${{ github.event.inputs.plataforma }}" ]; then
              echo "si=1" >> $GITHUB_OUTPUT
            else
              echo "si=0" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi
          MODO="${{ needs.plan.outputs.modo }}"
          if [ "$MODO" = "mensual" ] && [ "${{ matrix.plataforma }}" != "uber" ]; then
            echo "si=0" >> $GITHUB_OUTPUT; exit 0
          fi
          if [ "$MODO" = "diario" ] && [ "${{ matrix.plataforma }}" = "justeat" ]; then
            echo "si=0" >> $GITHUB_OUTPUT; exit 0
          fi
          echo "si=1" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.toca.outputs.si == '1'
      - uses: actions/setup-node@v4
        if: steps.toca.outputs.si == '1'
        with:
          node-version: "20"
          cache: "npm"
      - name: Instalar dependencias
        if: steps.toca.outputs.si == '1'
        run: npm install --no-audit --no-fund
      - name: Cache navegador Playwright
        id: cache-playwright
        if: steps.toca.outputs.si == '1'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Instalar navegador Playwright
        if: steps.toca.outputs.si == '1' && steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Dependencias de sistema (con caché)
        if: steps.toca.outputs.si == '1' && steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Descargar informes y dejarlos en la bandeja
        if: steps.toca.outputs.si == '1'
        env:
          MODO: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.modo || needs.plan.outputs.modo }}
          MES: ${{ github.event.inputs.mes }}
          TRIMESTRE: ${{ github.event.inputs.mes }}
          ROBOT_DRY: ${{ github.event.inputs.simulacro }}
          SUPABASE_URL: https://eryauogxcpbgdryeimdq.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/robot-ingesta/${{ matrix.plataforma }}.ts
