<!doctype html>
<html lang="es">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&family=Nunito:wght@700;800;900&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/data/logo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FCEFD6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Streat Lab" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/data/logo-icon.svg" />
    <title>Streat Lab ERP</title>
    <!-- Captura TEMPRANA del evento de instalación (Android/Chrome lo dispara
         una sola vez y a menudo antes de que monte React). Lo guardamos en
         window.__bip para que la app pueda ofrecer «Instalar» cuando quiera. -->
    <script>
      window.__bip = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__bip = e;
        window.dispatchEvent(new Event('bip-ready'));
      });
      window.addEventListener('appinstalled', function () { window.__bip = null; });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
